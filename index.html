<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TruSea Fish — Daily Orders</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --deep:    #03045e;
  --ocean:   #0077b6;
  --sea:     #00b4d8;
  --foam:    #90e0ef;
  --fresh:   #06d6a0;
  --warn:    #fb8500;
  --danger:  #ef233c;
  --bg:      #f0f4f8;
  --card:    #ffffff;
  --text:    #1a1a2e;
  --muted:   #6b7280;
  --border:  #e2e8f0;
  --addon-bg:#fffbeb;
  --addon-c: #92400e;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-bottom: 50px;
  font-size: 14px;
}

/* ═══════════════════════════════
   HEADER
═══════════════════════════════ */
.header {
  background: linear-gradient(135deg, var(--deep) 0%, var(--ocean) 100%);
  padding: 14px 16px 10px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 2px 16px rgba(0,0,0,0.25);
}
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.brand { display: flex; align-items: center; gap: 10px; }
.logo-wrap {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: rgba(255,255,255,0.12);
  border: 1.5px solid rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; cursor: pointer; flex-shrink: 0;
}
.logo-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
.logo-wrap .logo-ph { font-size: 20px; }
#logoUpload { display: none; }
.brand-text h1 {
  font-size: 15px; font-weight: 800;
  color: var(--foam); letter-spacing: -0.3px; font-style: italic;
  line-height: 1.1;
}
.brand-text p { font-size: 10px; color: rgba(144,224,239,0.65); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }

.header-actions { display: flex; gap: 6px; align-items: center; }
.hbtn {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 5px 11px;
  font-size: 13px; color: #fff; cursor: pointer;
}
.hbtn:active { opacity: 0.7; }
.sync-bar {
  font-size: 10px; color: rgba(255,255,255,0.5);
  display: flex; align-items: center; justify-content: space-between;
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--fresh); margin-right: 5px; display: inline-block; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ═══════════════════════════════
   SUMMARY CARDS
═══════════════════════════════ */
.summary {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 8px;
  padding: 12px 12px 0;
}
.sum-card {
  background: var(--card);
  border-radius: 12px;
  padding: 10px 6px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.sum-n { font-size: 22px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
.sum-l { font-size: 10px; color: var(--muted); font-weight: 600; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.3px; }
.c-blue   { color: var(--ocean); }
.c-green  { color: var(--fresh); }
.c-orange { color: var(--warn);  }
.c-red    { color: var(--danger);}

/* ═══════════════════════════════
   SEARCH
═══════════════════════════════ */
.search-wrap { padding: 10px 12px 0; position: relative; }
.search-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--muted); pointer-events: none; margin-top: 5px; }
.search-input {
  width: 100%; padding: 9px 12px 9px 36px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 14px; color: var(--text); outline: none;
}
.search-input:focus { border-color: var(--ocean); }

/* ═══════════════════════════════
   TABS
═══════════════════════════════ */
.tabs {
  display: flex;
  padding: 10px 12px 0;
  gap: 8px;
}
.tab {
  flex: 1; padding: 8px 0; text-align: center;
  font-size: 13px; font-weight: 700;
  border: none; cursor: pointer;
  background: var(--card); color: var(--muted);
  border-radius: 10px 10px 0 0;
  border-bottom: 3px solid transparent;
  transition: all 0.15s;
}
.tab.active { color: var(--ocean); border-bottom-color: var(--ocean); }

/* ═══════════════════════════════
   FILTER CHIPS
═══════════════════════════════ */
.chips {
  display: flex; gap: 6px;
  padding: 8px 12px;
  overflow-x: auto; scrollbar-width: none;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 5px 12px;
  border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--bg); color: var(--muted);
  cursor: pointer; white-space: nowrap;
}
.chip.active { background: var(--ocean); border-color: var(--ocean); color: #fff; }

/* ═══════════════════════════════
   ORDER LIST
═══════════════════════════════ */
.list-head {
  padding: 10px 12px 6px;
  font-size: 11px; font-weight: 700;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 6px;
}
.cnt { background: var(--ocean); color: #fff; border-radius: 20px; padding: 1px 8px; font-size: 11px; font-weight: 700; }

.orders { padding: 0 12px; display: flex; flex-direction: column; gap: 10px; }

/* ═══════════════════════════════
   ORDER CARD
═══════════════════════════════ */
.card {
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  overflow: hidden;
}
.card.confirmed  { border-top: 3px solid var(--fresh); }
.card.pending    { border-top: 3px solid var(--warn);  }
.card.unconfirmed{ border-top: 3px solid var(--danger);}

/* Card Header */
.card-head {
  padding: 12px 14px 10px;
  display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
  border-bottom: 1px solid var(--border);
}
.order-id {
  font-size: 10px; font-weight: 800; color: var(--ocean);
  background: #e8f4fd; border-radius: 6px;
  padding: 2px 8px; display: inline-block; margin-bottom: 4px;
  letter-spacing: 0.3px;
}
.cust-name  { font-size: 15px; font-weight: 700; }
.cust-phone { font-size: 12px; color: var(--muted); margin-top: 2px; }
.cust-time  { font-size: 10px; color: var(--muted); margin-top: 2px; opacity: 0.8; }

/* Card Body */
.card-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }

/* ── ORDER SUMMARY BLOCK ── */
.summary-box {
  background: #f8fafc;
  border-radius: 10px;
  overflow: hidden;
}
.summary-lbl {
  font-size: 10px; font-weight: 700;
  color: var(--ocean); text-transform: uppercase; letter-spacing: 0.5px;
  padding: 7px 10px 5px;
}

/* Each product item in summary */
.prod-item {
  padding: 8px 10px;
  border-top: 1px solid var(--border);
}
.prod-item:first-of-type { border-top: none; }

.prod-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  line-height: 1.4; margin-bottom: 5px;
}

/* Qty row */
.qty-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px; flex-wrap: wrap;
}
.qty-badge {
  font-size: 11px; font-weight: 700; color: var(--ocean);
  background: #dbeafe; border-radius: 6px; padding: 2px 8px;
  flex-shrink: 0;
}
.unit-price { font-size: 11px; color: var(--muted); flex: 1; }
.line-amt   { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; }

/* Addon row */
.addon-row {
  display: flex; align-items: flex-start; gap: 5px;
  background: var(--addon-bg);
  border-radius: 6px; padding: 4px 8px;
  margin-bottom: 4px;
}
.addon-tag  { font-size: 10px; font-weight: 700; color: var(--addon-c); flex-shrink: 0; padding-top: 1px; }
.addon-desc { font-size: 11px; color: #78350f; flex: 1; line-height: 1.4; }
.addon-amt  { font-size: 11px; font-weight: 700; color: var(--addon-c); white-space: nowrap; flex-shrink: 0; }

/* Sub-total row */
.sub-row {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 3px;
}
.sub-lbl { font-size: 11px; color: var(--muted); font-weight: 500; }
.sub-val { font-size: 12px; font-weight: 800; color: var(--text); }

/* ── Pre-Book Box ── */
.prebook-box {
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  border-radius: 10px;
  padding: 8px 10px;
}
.prebook-lbl { font-size: 10px; font-weight: 700; color: #15803d; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
.prebook-item { font-size: 13px; color: #166534; font-weight: 500; padding: 3px 0; border-bottom: 1px solid #d1fae5; }
.prebook-item:last-child { border-bottom: none; }

/* ── Address + Buttons ── */
.loc-row {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
}
.addr-text { font-size: 12px; color: var(--muted); flex: 1; display: flex; gap: 4px; align-items: flex-start; }
.btn-group { display: flex; gap: 6px; flex-shrink: 0; }
.action-btn {
  font-size: 11px; font-weight: 700; color: #fff;
  border: none; border-radius: 8px; padding: 6px 11px;
  cursor: pointer; text-decoration: none;
  display: inline-flex; align-items: center; gap: 3px; white-space: nowrap;
}
.btn-call { background: var(--fresh); }
.btn-map  { background: var(--ocean); }

/* ── Grand Total ── */
.grand-total {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--deep); border-radius: 10px; padding: 9px 14px;
}
.gt-lbl { font-size: 12px; color: rgba(255,255,255,0.65); font-weight: 600; }
.gt-val { font-size: 17px; font-weight: 800; color: var(--foam); letter-spacing: -0.5px; }

/* ── Status Grid ── */
.status-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
}
.stat-item { display: flex; flex-direction: column; gap: 3px; }
.stat-lbl  { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }

/* ── Pills ── */
.pill {
  display: inline-block; font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px; white-space: nowrap;
}
.p-confirmed   { background:#d1fae5; color:#065f46; }
.p-pending     { background:#fef3c7; color:#92400e; }
.p-done        { background:#d1fae5; color:#065f46; }
.p-inprogress  { background:#fef3c7; color:#92400e; }
.p-notstarted  { background:#f1f5f9; color:#64748b; }
.p-dispatched  { background:#e0e7ff; color:#3730a3; }
.p-delivered   { background:#d1fae5; color:#065f46; }
.p-outdelivery { background:#ede9fe; color:#5b21b6; }
.p-paid        { background:#d1fae5; color:#065f46; }
.p-cod         { background:#fee2e2; color:#991b1b; }
.p-online      { background:#dbeafe; color:#1e40af; }

/* ═══════════════════════════════
   EMPTY / LOADING
═══════════════════════════════ */
.empty   { text-align:center; padding:48px 24px; color:var(--muted); }
.empty-i { font-size:40px; margin-bottom:10px; }
.loading { text-align:center; padding:48px 20px; color:var(--muted); font-size:14px; }
.spinner {
  width:28px; height:28px;
  border:3px solid var(--border); border-top-color:var(--ocean);
  border-radius:50%; animation:spin 0.8s linear infinite;
  margin:0 auto 12px;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ═══════════════════════════════
   TOAST
═══════════════════════════════ */
#toast {
  position:fixed; top:80px; left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:var(--deep); color:#fff;
  border-radius:14px; padding:11px 18px;
  font-size:13px; z-index:999;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
  max-width:320px; width:90%;
  opacity:0; transition:all 0.3s ease; pointer-events:none;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.t-title { font-weight:700; font-size:14px; margin-bottom:3px; }
.t-body  { opacity:0.8; font-size:12px; }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<div class="header">
  <div class="header-row">
    <div class="brand">
      <div class="logo-wrap" onclick="document.getElementById('logoUpload').click()">
        <img id="logoImg" src="" style="display:none">
        <span class="logo-ph" id="logoPh">🐠</span>
      </div>
      <input type="file" id="logoUpload" accept="image/*" onchange="uploadLogo(this)">
      <div class="brand-text">
        <h1>🐟 TruSea Fish</h1>
        <p>Daily Orders</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="hbtn" id="bellBtn">🔔</button>
      <button class="hbtn" onclick="syncNow()">⟳</button>
    </div>
  </div>
  <div class="sync-bar">
    <span><span class="sync-dot"></span><span id="syncInfo">Connecting…</span></span>
    <span id="countdown" style="opacity:0.4"></span>
  </div>
</div>

<!-- ══ SUMMARY ══ -->
<div class="summary" id="summary"></div>

<!-- ══ SEARCH ══ -->
<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-input" type="search" id="searchQ" placeholder="Search name, order ID, phone…" oninput="render()">
</div>

<!-- ══ TABS ══ -->
<div class="tabs">
  <button class="tab active" onclick="setTab('all',this)">🐟 All Orders</button>
  <button class="tab" onclick="setTab('prebook',this)">📅 Pre-Book</button>
</div>

<!-- ══ CHIPS ══ -->
<div class="chips">
  <button class="chip active" onclick="setFilter('all',this)">All</button>
  <button class="chip" onclick="setFilter('unconfirmed',this)">⏳ Unconfirmed</button>
  <button class="chip" onclick="setFilter('processing',this)">🔄 Processing</button>
  <button class="chip" onclick="setFilter('dispatched',this)">🚚 Dispatched</button>
  <button class="chip" onclick="setFilter('delivered',this)">✅ Delivered</button>
  <button class="chip" onclick="setFilter('pay_pending',this)">💰 Pay Pending</button>
  <button class="chip" onclick="setFilter('cod',this)">💵 COD</button>
</div>

<!-- ══ ORDER LIST ══ -->
<div class="list-head">Orders <span class="cnt" id="cnt">0</span></div>
<div class="orders" id="orders">
  <div class="loading"><div class="spinner"></div>Loading orders…</div>
</div>

<div id="toast"><div class="t-title" id="tTitle"></div><div class="t-body" id="tBody"></div></div>

<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
const SHEET_ID  = '1LdJAHcoYX8ruxVEKG5j-X1KyaZohOLfhyYaUBmsVoyI';
const GID       = '1633140334';
const SYNC_SECS = 10 * 60; // 10 minutes

const COL = {
  timestamp:    'Timestamp',
  orderId:      'Order ID',
  name:         'Name',
  phone:        'Phone',
  address:      'Address',
  mapLink:      'Map Link',
  prebook:      'Pre-Book',
  orderTotal:   'Order Total',
  orderSummary: 'Order Summary',  // Column L
  confirm:      'Order Confirmation',
  processing:   'Processing',
  dispatch:     'Dispatch',
  delivery:     'Delivery Status',
  payMethod:    'Payment Method',
  payment:      'Payment Status',
};

const STATUS = {
  confirmed:   'Confirmed',
  pending:     'Pending',
  done:        'Done',
  inProgress:  'In Progress',
  notStarted:  'Not Started',
  dispatched:  'Dispatched',
  outDelivery: 'Out for Delivery',
  delivered:   'Delivered',
  paid:        'Paid',
  cod:         'COD',
  online:      'Online',
};
// ══════════════════════════════════════════════

let orders      = [];
let activeTab   = 'all';
let activeFilter= 'all';
let prevSnap    = {};
let firstLoad   = true;
let countSecs   = SYNC_SECS;
let timer       = null;

// ── LOGO ─────────────────────────────────────
function uploadLogo(input) {
  const file = input.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = e => { localStorage.setItem('tsf_logo', e.target.result); applyLogo(e.target.result); };
  r.readAsDataURL(file);
}
function applyLogo(src) {
  document.getElementById('logoImg').src = src;
  document.getElementById('logoImg').style.display = 'block';
  document.getElementById('logoPh').style.display = 'none';
}
(() => { const s = localStorage.getItem('tsf_logo'); if (s) applyLogo(s); })();

// ── FETCH ─────────────────────────────────────
function fetchSheet() {
  return new Promise((resolve, reject) => {
    document.querySelectorAll('script[id^="gs_"]').forEach(s => s.remove());
    Object.keys(window).filter(k => k.startsWith('__cb_')).forEach(k => delete window[k]);

    const cb = '__cb_' + Date.now();
    const to = setTimeout(() => { delete window[cb]; reject(new Error('Timeout')); }, 12000);

    window[cb] = function(data) {
      clearTimeout(to); delete window[cb];
      try {
        if (!data.table?.rows?.length) return reject(new Error('No data'));

        const cols = (data.table.cols || []).map(c => (c.label || '').trim());
        const fi = (...names) => {
          for (const name of names) {
            let i = cols.findIndex(c => c === name);
            if (i >= 0) return i;
            i = cols.findIndex(c => c.toLowerCase() === name.toLowerCase());
            if (i >= 0) return i;
            i = cols.findIndex(c => c.toLowerCase().includes(name.toLowerCase()));
            if (i >= 0) return i;
          }
          return -1;
        };

        const I = {
          ts:      fi(COL.timestamp),
          oid:     fi(COL.orderId),
          name:    fi(COL.name),
          phone:   fi(COL.phone),
          addr:    fi(COL.address),
          map:     fi(COL.mapLink),
          pre:     fi(COL.prebook),
          total:   fi(COL.orderTotal),
          summary: fi(COL.orderSummary),
          conf:    fi(COL.confirm),
          proc:    fi(COL.processing),
          disp:    fi(COL.dispatch),
          deliv:   fi(COL.delivery),
          pmeth:   fi(COL.payMethod),
          pay:     fi(COL.payment),
        };

        const v  = (r,i) => (i>=0 && r.c[i]?.v != null) ? String(r.c[i].v).trim() : '';
        const fv = (r,i) => (i>=0 && r.c[i]) ? (r.c[i].f || v(r,i)) : '';

        const tsStr = (r, i) => {
          if (i < 0 || !r.c[i]?.v) return '';
          const raw = r.c[i].v;
          if (typeof raw === 'string' && raw.startsWith('Date(')) {
            const p = raw.replace('Date(','').replace(')','').split(',');
            return new Date(+p[0],+p[1],+p[2],+(p[3]||0),+(p[4]||0))
              .toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true});
          }
          return r.c[i].f || String(raw).trim();
        };

        // Format Order ID → TSF-XXXX
        const fmtId = (raw, idx) => {
          if (!raw) return 'TSF-' + String(idx + 1).padStart(3, '0');
          // Already has TSF- prefix
          if (/^TSF-/i.test(raw)) return raw.toUpperCase();
          // Has TS- prefix → convert to TSF-
          if (/^TS-/i.test(raw)) return 'TSF-' + raw.replace(/^TS-/i,'');
          // Pure number
          const num = raw.replace(/[^0-9]/g,'');
          return num ? 'TSF-' + num : raw;
        };

        const rows = data.table.rows.map((r, i) => ({
          orderId:      fmtId(v(r, I.oid), i),
          name:         v(r, I.name),
          phone:        v(r, I.phone),
          address:      v(r, I.addr),
          mapLink:      v(r, I.map),
          prebook:      v(r, I.pre),
          orderTotal:   fv(r, I.total) || v(r, I.total),
          orderSummary: v(r, I.summary),
          timestamp:    tsStr(r, I.ts),
          confirm:      v(r, I.conf)  || STATUS.pending,
          processing:   v(r, I.proc)  || STATUS.notStarted,
          dispatch:     v(r, I.disp)  || STATUS.pending,
          delivery:     v(r, I.deliv) || STATUS.pending,
          payMethod:    v(r, I.pmeth) || '—',
          payment:      v(r, I.pay)   || STATUS.pending,
        })).filter(o => o.name?.length > 1);

        resolve(rows.reverse()); // newest first
      } catch(e) { reject(e); }
    };

    const s   = document.createElement('script');
    s.id      = 'gs_' + Date.now();
    s.src     = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&gid=${GID}&v=${Date.now()}&r=${Math.random()}`;
    s.onerror = () => { clearTimeout(to); reject(new Error('Load failed')); };
    document.head.appendChild(s);
  });
}

// ── PARSE ORDER SUMMARY ───────────────────────
// Parse WhatsApp-format order summary text into structured items
// Format:
//   Order Summary:
//   * Product Name
//     Qty: 2 × ₹1380
//     Add-ons: Head & Tail +₹199
//     Sub-total: ₹3,159
//   Order Total: ₹7,173
function parseOrderSummary(text) {
  if (!text || !text.trim()) return null;

  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const items = [];
  let current = null;

  for (const line of lines) {
    if (line.startsWith('* ')) {
      if (current) items.push(current);
      current = { name: line.slice(2).trim(), qty: null, unitPrice: null, addons: null, subtotal: null };
    } else if (current) {
      // Qty: 2 × ₹1380
      const qtyM = line.match(/Qty:\s*(\d+)\s*[×x]\s*₹([\d,]+)/i);
      if (qtyM) {
        current.qty       = parseInt(qtyM[1]);
        current.unitPrice = parseInt(qtyM[2].replace(/,/g,''));
      }
      // Add-ons: Head & Tail +₹199
      const addonM = line.match(/Add-ons?:\s*(.+)/i);
      if (addonM) current.addons = addonM[1].trim();
      // Sub-total: ₹1,579
      const subM = line.match(/Sub-total:\s*₹([\d,]+)/i);
      if (subM) current.subtotal = parseInt(subM[1].replace(/,/g,''));
    }
  }
  if (current) items.push(current);

  // Order total from text
  const totalM = text.match(/Order Total:\s*₹([\d,]+)/i);
  const total   = totalM ? parseInt(totalM[1].replace(/,/g,'')) : null;

  return { items, total };
}

// ── BUILD ORDER SUMMARY HTML ──────────────────
function buildSummaryHtml(o) {
  const parsed = parseOrderSummary(o.orderSummary);

  if (!parsed || !parsed.items.length) {
    // Fallback: just show raw text
    return o.orderSummary
      ? `<div class="summary-box"><div class="summary-lbl">🐟 Order Details</div><div style="padding:8px 10px;font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap">${o.orderSummary}</div></div>`
      : '';
  }

  const itemsHtml = parsed.items.map(item => {
    // Calculate addon amount from addon text
    let addonAmt = 0;
    if (item.addons) {
      const matches = item.addons.match(/\+₹([\d,]+)/g) || [];
      addonAmt = matches.reduce((sum, m) => sum + parseInt(m.replace(/[^0-9]/g,'')), 0);
    }

    const lineAmt  = (item.unitPrice || 0) * (item.qty || 1);
    const subtotal = item.subtotal || (lineAmt + addonAmt);

    return `
      <div class="prod-item">
        <div class="prod-name">${item.name}</div>
        ${item.unitPrice ? `
        <div class="qty-row">
          <span class="qty-badge">Qty × ${item.qty || 1}</span>
          <span class="unit-price">₹${(item.unitPrice).toLocaleString('en-IN')} / unit</span>
          <span class="line-amt">₹${lineAmt.toLocaleString('en-IN')}</span>
        </div>` : ''}
        ${item.addons ? `
        <div class="addon-row">
          <span class="addon-tag">➕ Add-ons</span>
          <span class="addon-desc">${item.addons}</span>
          ${addonAmt > 0 ? `<span class="addon-amt">+₹${addonAmt.toLocaleString('en-IN')}</span>` : ''}
        </div>` : ''}
        ${subtotal && (item.addons || (item.qty||1) > 1) ? `
        <div class="sub-row">
          <span class="sub-lbl">Sub-total</span>
          <span class="sub-val">₹${subtotal.toLocaleString('en-IN')}</span>
        </div>` : ''}
      </div>`;
  }).join('');

  return `
    <div class="summary-box">
      <div class="summary-lbl">🐟 Products</div>
      ${itemsHtml}
    </div>`;
}

// ── ALERTS ────────────────────────────────────
function makeSnap(list) {
  const s = {};
  list.forEach(o => { s[o.orderId] = [o.confirm,o.processing,o.dispatch,o.delivery,o.payment].join('|'); });
  return s;
}
function beep(type) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(type==='new'?520:440, ctx.currentTime);
    if (type==='new') o.frequency.setValueAtTime(780, ctx.currentTime+0.15);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.4);
  } catch(e){}
}
function toast(title, body, color='#06d6a0') {
  document.getElementById('tTitle').style.color = color;
  document.getElementById('tTitle').textContent = title;
  document.getElementById('tBody').textContent  = body;
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 4000);
}
function notify(title, body, type) {
  beep(type);
  toast(title, body, type==='new'?'#06d6a0':'#fbbf24');
  if (Notification.permission==='granted') {
    try { new Notification(title,{body,tag:type+Date.now()}); } catch(e){}
  }
}
function checkAlerts(list) {
  if (firstLoad) { prevSnap = makeSnap(list); firstLoad = false; return; }
  const snap = makeSnap(list);
  const fresh=[], changed=[];
  list.forEach(o => {
    if (!prevSnap[o.orderId]) fresh.push(o);
    else if (prevSnap[o.orderId] !== snap[o.orderId]) changed.push(o);
  });
  if (fresh.length) notify(`🐟 ${fresh.length} New Order${fresh.length>1?'s':''}!`, fresh.map(o=>o.name).join(', '),'new');
  changed.forEach(o => notify('🔄 Order Updated',`${o.name} · ${o.delivery}`,'change'));
  prevSnap = snap;
}

// ── SYNC ──────────────────────────────────────
async function syncNow(silent=false) {
  if (!silent) document.getElementById('syncInfo').textContent = 'Syncing…';
  try {
    const live = await fetchSheet();
    if (live.length) {
      checkAlerts(live);
      orders = live;
      const t = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      document.getElementById('syncInfo').textContent = `✓ Live · ${live.length} orders · ${t}`;
      if (!silent) toast('✓ Synced', `${live.length} orders`, '#06d6a0');
    } else throw new Error('empty');
  } catch(e) {
    document.getElementById('syncInfo').textContent = '⚠ Sheet not reachable';
    if (!orders.length) orders = DEMO;
    if (!silent) toast('⚠ Demo mode','Make sheet public to connect','#fbbf24');
  }
  render();
  resetTimer();
}

function resetTimer() {
  clearInterval(timer);
  countSecs = SYNC_SECS;
  timer = setInterval(() => {
    countSecs--;
    const m = Math.floor(countSecs/60), s = countSecs%60;
    document.getElementById('countdown').textContent = `next sync ${m}:${String(s).padStart(2,'0')}`;
    if (countSecs <= 0) syncNow(true);
  }, 1000);
}

// ── TABS & FILTERS ────────────────────────────
function setTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}
function applyFilter(list) {
  switch(activeFilter) {
    case 'unconfirmed': return list.filter(o => o.confirm !== STATUS.confirmed);
    case 'processing':  return list.filter(o => o.processing === STATUS.inProgress);
    case 'dispatched':  return list.filter(o => o.dispatch === STATUS.dispatched);
    case 'delivered':   return list.filter(o => o.delivery === STATUS.delivered);
    case 'pay_pending': return list.filter(o => o.payment === STATUS.pending);
    case 'cod':         return list.filter(o => o.payMethod === STATUS.cod);
    default:            return list;
  }
}

// ── PILL ──────────────────────────────────────
function pill(v) {
  const m = {
    [STATUS.confirmed]:   'p-confirmed',
    [STATUS.pending]:     'p-pending',
    [STATUS.done]:        'p-done',
    [STATUS.inProgress]:  'p-inprogress',
    [STATUS.notStarted]:  'p-notstarted',
    [STATUS.dispatched]:  'p-dispatched',
    [STATUS.delivered]:   'p-delivered',
    [STATUS.outDelivery]: 'p-outdelivery',
    [STATUS.paid]:        'p-paid',
    [STATUS.cod]:         'p-cod',
    [STATUS.online]:      'p-online',
  };
  return 'pill ' + (m[v] || 'p-pending');
}

// ── RENDER ────────────────────────────────────
function render() {
  const q = document.getElementById('searchQ').value.toLowerCase().trim();

  let list = orders.filter(o => {
    if (activeTab === 'prebook') return o.prebook?.trim();
    return true;
  });
  if (q) list = list.filter(o =>
    [o.name,o.phone,o.orderId,o.address,o.orderSummary,o.prebook].join(' ').toLowerCase().includes(q)
  );
  list = applyFilter(list);

  // Summary
  document.getElementById('summary').innerHTML = [
    { n: orders.length,                                                lbl:'Total',    c:'c-blue'   },
    { n: orders.filter(o=>o.confirm===STATUS.confirmed).length,        lbl:'Confirmed',c:'c-green'  },
    { n: orders.filter(o=>o.dispatch===STATUS.dispatched||o.delivery===STATUS.outDelivery).length, lbl:'Dispatched',c:'c-orange'},
    { n: orders.filter(o=>o.payment===STATUS.pending).length,          lbl:'Pay Due',  c:'c-red'    },
  ].map(s=>`<div class="sum-card"><div class="sum-n ${s.c}">${s.n}</div><div class="sum-l">${s.lbl}</div></div>`).join('');

  document.getElementById('cnt').textContent = list.length;

  if (!list.length) {
    document.getElementById('orders').innerHTML =
      `<div class="empty"><div class="empty-i">📭</div>No orders found</div>`;
    return;
  }

  document.getElementById('orders').innerHTML = list.map(o => {
    const cls = o.confirm===STATUS.confirmed ? 'confirmed' : o.confirm===STATUS.pending ? 'pending' : 'unconfirmed';
    const summaryHtml = buildSummaryHtml(o);
    const grandTotal  = parseFloat(String(o.orderTotal).replace(/[^0-9.]/g,'')) || 0;

    // Pre-book items
    const prebookHtml = o.prebook
      ? `<div class="prebook-box">
          <div class="prebook-lbl">📅 Pre-Book</div>
          ${o.prebook.split('|').map(p=>p.trim()).filter(Boolean).map(p=>`<div class="prebook-item">${p}</div>`).join('')}
        </div>`
      : '';

    return `
    <div class="card ${cls}">
      <div class="card-head">
        <div style="flex:1;min-width:0">
          <div class="order-id">${o.orderId}</div>
          <div class="cust-name">${o.name}</div>
          <div class="cust-phone">📞 ${o.phone || '—'}</div>
          ${o.timestamp ? `<div class="cust-time">🕐 ${o.timestamp}</div>` : ''}
        </div>
        <span class="${pill(o.confirm)}">${o.confirm}</span>
      </div>

      <div class="card-body">
        ${summaryHtml}
        ${prebookHtml}

        ${o.address ? `
        <div class="loc-row">
          <div class="addr-text">📍 ${o.address}</div>
          <div class="btn-group">
            ${o.phone   ? `<a class="action-btn btn-call" href="tel:${o.phone.replace(/\s+/g,'')}">📞 Call</a>` : ''}
            ${o.mapLink ? `<a class="action-btn btn-map"  href="${o.mapLink}" target="_blank">🗺 Map</a>` : ''}
          </div>
        </div>` : ''}

        ${grandTotal ? `
        <div class="grand-total">
          <span class="gt-lbl">Order Total</span>
          <span class="gt-val">₹${grandTotal.toLocaleString('en-IN')}</span>
        </div>` : ''}

        <div class="status-grid">
          <div class="stat-item"><div class="stat-lbl">Processing</div><span class="${pill(o.processing)}">${o.processing}</span></div>
          <div class="stat-item"><div class="stat-lbl">Dispatch</div><span class="${pill(o.dispatch)}">${o.dispatch}</span></div>
          <div class="stat-item"><div class="stat-lbl">Delivery</div><span class="${pill(o.delivery)}">${o.delivery}</span></div>
          <div class="stat-item"><div class="stat-lbl">Payment</div><span class="${pill(o.payment)}">${o.payment}${o.payMethod&&o.payMethod!=='—'?' · '+o.payMethod:''}</span></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── NOTIFICATION ──────────────────────────────
document.getElementById('bellBtn').addEventListener('click', () => {
  if (!('Notification' in window)) { toast('⚠ Not supported','Use Chrome','#fbbf24'); return; }
  if (Notification.permission==='granted') {
    toast('🔔 Alerts Active','New orders will notify you','#06d6a0');
  } else {
    Notification.requestPermission().then(p => {
      if (p==='granted') toast('🔔 Enabled!','You will get notifications','#06d6a0');
      else toast('🔕 Blocked','Allow in browser settings','#ef4444');
    });
  }
});
